# Brev Launchable configuration for:
# Worker Safety in a Classical Warehouse with Cosmos Reason 2
#
# This file defines the environment for one-click launch via Brev.
# Hardware: 1x A100 80GB (minimum). H100 also supported.
# Runtime: ~10-20 min setup on first launch (model download from HuggingFace)

name: cosmos-reason2-worker-safety
description: >
  Zero-shot safety compliance and hazard detection using Cosmos Reason 2.
  Runs the worker safety inference pipeline with FiftyOne visualization.

# Hardware requirements
instance:
  gpu: "A100-80GB"     # minimum; H100-80GB also works
  gpu_count: 1
  disk_gb: 100         # model weights (~5GB) + dataset + workspace

# Base environment
base_image: "nvcr.io/nvidia/cuda:12.4.1-cudnn-devel-ubuntu22.04"

# Environment setup script
setup: |
  #!/bin/bash
  set -e

  # System dependencies
  apt-get update -q
  apt-get install -y -q curl ffmpeg git git-lfs python3-pip
  git lfs install

  # Install uv
  curl -LsSf https://astral.sh/uv/install.sh | sh
  source $HOME/.local/bin/env

  # Clone Cosmos Reason 2
  git clone https://github.com/nvidia-cosmos/cosmos-reason2.git /workspace/cosmos-reason2
  cd /workspace/cosmos-reason2
  git lfs pull

  # Install Python environment (CUDA 12.4)
  uv sync --extra cu124
  source .venv/bin/activate

  # Install recipe dependencies
  pip install -U fiftyone jupyterlab ipykernel
  python -m ipykernel install --user --name cosmos-reason2 --display-name "Python (cosmos-reason2)"

  echo "Setup complete. Launch JupyterLab with: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser"

# Ports to expose
ports:
  - 8888   # JupyterLab

# Launch command
launch: |
  cd /workspace/cosmos-reason2
  source .venv/bin/activate
  jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root \
    --NotebookApp.token='' --NotebookApp.password=''

# Pre-launch notes shown to the user
notes: |
  Before running the notebook, authenticate with Hugging Face to download the model:

    huggingface-cli login

  Then open the Worker Safety notebook in JupyterLab:
    cosmos-cookbook/docs/recipes/inference/reason2/worker_safety/worker_safety.ipynb

  Select kernel: Python (cosmos-reason2)
